run_id: xpolicy_oft_robodojo_v30
run_root_dir: ../checkpoints
seed: 0
wandb_entity: youshi-sun-yat-sen-university
wandb_project: llavavla
is_debug: false
version_id: '0.21'
framework:
  name: QwenOFT
  qwenvl:
    base_vlm: ./playground/Pretrained_models/Qwen3-VL-4B-Instruct
    attn_implementation: flash_attention_2
  action_model:
    action_model_type: MLP
    action_dim: 14
    state_dim: 14
    action_horizon: 16
    future_action_window_size: 15
    past_action_window_size: 0
datasets:
  vla_data:
    dataset_py: lerobot_datasets
    include_state: false
    video_backend: torchvision_av
    data_root_dir: /cpfs_infra/user/wangkaixuan
    data_mix: xpolicylab_robodojo_sim_arx_x5_v30
    action_type: abs_qpos
    per_device_batch_size: 16
    load_all_data_for_training: false
    obs_image_size: [224, 224]
    lerobot_version: v3.0
trainer:
  max_train_steps: 100000
  num_warmup_steps: 5000
  save_interval: 20000
  eval_interval: 10000
  learning_rate:
    base: 1.0e-05
    qwen_vl_interface: 1.0e-05
    action_model: 0.0001
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 5.0e-07
  freeze_modules: ''
  loss_scale:
    vla: 1.0
  max_grad_norm: 1.0
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1
  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08
