run_id: starvla_qwenoft_robocasa365_OpenDrawer
run_root_dir: results/Checkpoints
seed: 42
wandb_entity: your_wandb_entity
wandb_project: starVLA_robocasa365
is_debug: false
version_id: "0.21"

# QwenOFT framework: Qwen3-VL-4B backbone + MLP regression action head (L1).
# action_dim=12 matches RoboCasa365 PandaOmron gym wrapper:
#   eef_pos(3) + eef_rot(3) + gripper_close(1) + base_motion(4) + control_mode(1)
framework:
  name: QwenOFT
  qwenvl:
    base_vlm: ./playground/Pretrained_models/Qwen3-VL-4B-Instruct-Action
    attn_implementation: flash_attention_2
  action_model:
    action_model_type: MLP
    action_dim: 12
    state_dim: 16
    action_horizon: 16
    future_action_window_size: 15
    past_action_window_size: 0

datasets:
  vla_data:
    dataset_py: lerobot_datasets
    include_state: false
    data_root_dir: playground/Datasets/robocasa365
    data_mix: robocasa365_open_drawer_target_human
    action_type: delta_ee
    sequential_step_sampling: false
    per_device_batch_size: 4
    load_all_data_for_training: true
    obs_image_size: [224, 224]
    delete_pause_frame: false
    video_backend: torchvision_av

trainer:
  # Walk-through training: only 100 steps to validate the pipeline end-to-end.
  max_train_steps: 100
  num_warmup_steps: 10
  save_interval: 100
  eval_interval: 1000
  learning_rate:
    base: 2.5e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: ''
  loss_scale:
    vla: 1.0
    vlm: 0.1
  max_grad_norm: 1.0
  weight_decay: 0.0
  logging_frequency: 5
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08
