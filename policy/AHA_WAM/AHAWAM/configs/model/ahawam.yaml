_target_: ahawam.runtime.create_ahawam
model_id: Wan-AI/Wan2.2-TI2V-5B
tokenizer_model_id: Wan-AI/Wan2.1-T2V-1.3B
tokenizer_max_len: 128
load_text_encoder: false
proprio_dim: ${data.train.processor.proprio_output_dim}
redirect_common_files: true
mot_checkpoint_mixed_attn: true
action_dit_pretrained_path: /path/to/dualWAM/checkpoints/ActionDiT_linear_interp_Wan22_alphascale_1024hdim.pt
skip_dit_load_from_pretrain: false

action_horizon: 64
action_chunk_size: 16
max_action_offset: 0
action_train_timestep_mode: per_chunk
action_obs_downsample_factor: 1
chunk_kv_editor_num_queries: 32

num_history_frames: 0
action_video_read_mode: current_only
video_rope_frame_stride: 1

video_dit_config:
  has_image_input: false
  patch_size: [1, 2, 2]
  in_dim: 48
  hidden_dim: 3072
  ffn_dim: 14336
  freq_dim: 256
  text_dim: 4096
  out_dim: 48
  num_heads: 24
  attn_head_dim: 128
  num_layers: 30
  eps: 1.0e-06
  seperated_timestep: true
  require_clip_embedding: false
  require_vae_embedding: false
  fuse_vae_embedding_in_latents: true
  use_gradient_checkpointing: ${model.mot_checkpoint_mixed_attn}
  video_attention_mask_mode: "per_frame_causal"
  action_conditioned: false
  action_dim: ${data.train.processor.action_output_dim}
  action_group_causal_mask_mode: "group_diagonal"

action_dit_config:
  action_dim: ${data.train.processor.action_output_dim}
  hidden_dim: 1024
  ffn_dim: 4096
  num_heads: 24
  attn_head_dim: 128
  num_layers: 30
  text_dim: 4096
  freq_dim: 256
  eps: 1.0e-06
  autoregressive_teacher_forcing: true
  action_chunk_size: ${model.action_chunk_size}
  action_teacher_forcing_mask_mode: "stage1_chunkwise"
  use_gradient_checkpointing: ${model.mot_checkpoint_mixed_attn}

video_scheduler:
  train_shift: 5.0
  infer_shift: 5.0
  num_train_timesteps: 1000

action_scheduler:
  train_shift: 5.0
  infer_shift: 5.0
  num_train_timesteps: 1000

loss:
  lambda_action: 1.0
  lambda_action_prior: 1.0
