train:
  _target_: ahawam.datasets.lerobot.robot_video_dataset.RobotVideoDataset
  dataset_dirs:
    - /mnt/petrelfs/muyao/data/RoboDojo_lerobot_v21_video
  shape_meta:
    images:
      - key: cam_high
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: cam_left_wrist
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: cam_right_wrist
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
    action:
      - key: default
        raw_shape: 14
        shape: 14
    state:
      - key: default
        raw_shape: 14
        shape: 14
  num_frames: 65
  global_sample_stride: 1
  action_video_freq_ratio: 8
  video_size: [384, 320]
  camera_key: null
  val_set_proportion: 0.01
  is_training_set: true
  pretrained_norm_stats: /mnt/petrelfs/muyao/data/RoboDojo_lerobot_v21_video/dataset_stats.json
  skip_padding_as_possible: false
  concat_multi_camera: "robotwin"
  action_chunk_size: ${model.action_chunk_size}
  action_horizon: ${model.action_horizon}
  processor:
    _target_: ahawam.datasets.lerobot.processors.ahawam_processor.AHAWAMProcessor
    shape_meta: ${data.train.shape_meta}
    num_obs_steps: ${data.train.num_frames}
    num_output_cameras: 3
    action_output_dim: 14
    proprio_output_dim: 14
    action_state_transforms: null
    use_stepwise_action_norm: false
    norm_default_mode: "z-score"
    norm_exception_mode: null
    action_state_merger:
      _target_: ahawam.datasets.lerobot.transforms.action_state_merger.ConcatLeftAlign
    train_transforms:
      - _target_: ahawam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
    val_transforms:
      - _target_: ahawam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
  text_embedding_cache_dir: /mnt/petrelfs/muyao/data/RoboDojo_lerobot_v21_video/text_embeds_cache
  video_latent_cache_dir: null
  context_len: 128

val:
  _target_: ahawam.datasets.lerobot.robot_video_dataset.RobotVideoDataset
  dataset_dirs:
    - /mnt/petrelfs/muyao/data/RoboDojo_lerobot_v21_video
  shape_meta: ${data.train.shape_meta}
  num_frames: ${data.train.num_frames}
  global_sample_stride: ${data.train.global_sample_stride}
  action_video_freq_ratio: ${data.train.action_video_freq_ratio}
  video_size: ${data.train.video_size}
  camera_key: null
  val_set_proportion: ${data.train.val_set_proportion}
  is_training_set: false
  pretrained_norm_stats: /mnt/petrelfs/muyao/data/RoboDojo_lerobot_v21_video/dataset_stats.json
  skip_padding_as_possible: false
  concat_multi_camera: ${data.train.concat_multi_camera}
  action_chunk_size: ${model.action_chunk_size}
  action_horizon: ${model.action_horizon}
  processor:
    _target_: ahawam.datasets.lerobot.processors.ahawam_processor.AHAWAMProcessor
    shape_meta: ${data.train.shape_meta}
    num_obs_steps: ${data.train.num_frames}
    num_output_cameras: 3
    action_output_dim: 14
    proprio_output_dim: 14
    action_state_transforms: null
    use_stepwise_action_norm: false
    norm_default_mode: "z-score"
