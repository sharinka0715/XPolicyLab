run_id: eventvla_robotwin_mem
run_root_dir: results/Checkpoints
seed: 42
trackers: [jsonl, wandb]
wandb_entity: null
wandb_project: null
is_debug: false
debug_mode: false

framework:
  name: EventVLA
  # EventVLA exposes one clean public method.
  memory_ablation_mode: pure_image_keyframe_memory
  qwenvl:
    base_vlm: /path/to/Qwen3-VL-4B-Instruct
    attn_implementation: flash_attention_2
    vl_hidden_dim: 2048
  dino:
    dino_backbone: dinov2_vits14

  action_model:
    action_model_type: DiT-B
    hidden_size: 1024     # 和 DiT 最后的 projection 对应，用于 ActionDecoder
    add_pos_embed: True
    max_seq_len: 1024
    action_dim: 14
    state_dim: 14
    future_action_window_size: 49
    action_horizon: 50
    past_action_window_size: 0
    repeated_diffusion_steps: 8
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    num_inference_timesteps: 4
    num_target_vision_tokens: 32
    diffusion_model_cfg:    # DiT Transformers 的参数
      cross_attention_dim: 2048 # VLM 的 dim
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: "ada_norm"
      num_layers: 16
      output_dim: 2560
      positional_embeddings: null
  memory_buffer:
    # EventVLA stores raw keyframe images in the data/eval flow.
    enable: false
    qwen_memory_injection:
      enabled: true
      mode: pure_image_keyframe_memory
      keyframe_image_position: after_anchor_images_before_action
      max_keyframe_images: 4
      use_image_role_text: true
    keyframe_loss_weight: 1.0
    use_keyframe_predict_head: auto
    keyframe_positive_weight: 7.0
    keyframe_threshold: 0.5
    keyframe_predict_mode: chunk_future
    event_future_min_offset: 1
    event_commit_threshold: 0.55
    enable_keyframe_inference_event_filter: true
    keyframe_nms_window: 20
    keyframe_cooldown_steps: 20
    enable_delayed_chunk_event_commit: true
    memory_write_policy: disabled
    force_memory_write_current_for_event_commit: false
    disable_current_frame_keyframe_write_in_eval: true
    use_teacher_future_frame_write_in_train: false
    keyframe_train_memory_source: teacher_to_predict
    keyframe_eval_memory_source: predict
    keyframe_train_memory_schedule: teacher_to_predict
    keyframe_schedule_warmup_steps: 10000
    keyframe_schedule_transition_steps: 30000
    keyframe_schedule_teacher_prob_start: 1.0
    keyframe_schedule_teacher_prob_end: 0.0
    keyframe_schedule_mix_granularity: sample
    debug: false
    debug_interval: 100
    debug_first_steps: 0

datasets:
  vlm_data:
    dataset_py: vlm_datasets
    dataformat: llava_json
    dataset_use: asv2_conversation_en,asv2_detailed_description_en,asv2_region_captioning_en,coco_internvl_longcap_en,coco_karpathy_train_567_en,coco_negative_gpt4o_en,coco_poetry_zh,coco_rem_en_zh,cocorem_exist_yorn_en,cocotextv2_en,cocotextv2_gpt4o_en,okvqa_en,refcoco_grounding_aug_en,refcoco_grounding_en,tallyqa_coco_en,toloka_grounding_aug_en,vqav2_en,vsr_en
    eval_dataset: aokvqa_cauldron_llava_format
    data_flatten: false
    base_interval: 2
    max_pixels: 50176
    min_pixels: 784
    model_max_length: 2048
    model_type: qwen2.5vl
    per_device_batch_size: 4

  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: /path/to/robotwin_mem/lerobot_data
    data_mix: robotwin_mem
    action_type: abs_qpos
    action_mode: abs
    sequential_step_sampling: False
    use_sequential_episode_sampler: true
    shuffle_trajectories: true
    balance_task_step_counts: true
    num_workers: 4
    sampling_interval: 50
    chunk_keyframe_target_dilation: 8
    chunk_keyframe_target_kernel: raised_cosine
    event_future_min_offset: 1
    teacher_event_threshold: 0.55
    provide_chunk_keyframe_target: true
    provide_teacher_event_offset: true
    provide_teacher_should_commit: true
    # Derived from framework.memory_ablation_mode.
    provide_teacher_commit_images: false
    keyframe_image_memory:
      # Derived from framework.memory_ablation_mode.
      enabled: true
      max_keyframes: 4
      include_current_keyframe: true
      order: chronological
      selection: latest
      view_mode: include_names
      include_names: [cam_high, head, main]
      exclude_name_patterns: [wrist]
      strict_single_view: true
    default_image_resolution: [3, 224, 224]
    per_device_batch_size: 8
    load_all_data_for_training: true
    obs: ["image_0"]
    image_size: [224,224]
    video_backend: pyav
    temporal:
      enabled: true
      image:
        absolute_indices: [0]
        delta_indices: [-30, -15, 0]
        include_current: true

trainer:
  epochs: 100
  max_train_steps: 80000
  num_warmup_steps: 5000
  save_interval: 10000
  keep_recent_checkpoints: 2
  eval_interval: 1000
  learning_rate:
    base: 1e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
    keyframe_head: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 5.0e-07
  freeze_modules: ''
  train_only_modules: ''
  loss_scale:
    vla: 1.0
    vlm: 0.1
  # pretrained_checkpoint: null
  # reload_modules: ''
  repeated_diffusion_steps: 4
  max_grad_norm: 1.0
  warmup_ratio: 0.1
  weight_decay: 0.0
  logging_frequency: 1
  log_keyframe_samples: true
  log_keyframe_samples_interval: 1
  log_keyframe_samples_all_ranks: false
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08

  # parameters to be determined
  is_resume: false
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
