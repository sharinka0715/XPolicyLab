# A2D dual-arm 7-DOF robot (AgiBotWorld)
robot_type: a2d
action_mask_spec: [14, -2]
# Reorder action dimensions with flexible src->dst mapping
# Format: [src_start, src_end, dst_start, dst_end]
# Original: left_joint(7) + right_joint(7) + left_gripper(1) + right_gripper(1) = 16 dims
# Reordered: left_joint(7) + left_gripper(1) + right_joint(7) + right_gripper(1) = 16 dims
action_reorder:
  - [0, 7, 0, 7]      # left_joint: src[0:7] -> dst[0:7]
  - [14, 15, 7, 8]    # left_gripper: src[14:15] -> dst[7:8]
  - [7, 14, 8, 15]    # right_joint: src[7:14] -> dst[8:15]
  - [15, 16, 15, 16]  # right_gripper: src[15:16] -> dst[15:16]
state_reorder:
  - [0, 7, 0, 7]
  - [14, 15, 7, 8]
  - [7, 14, 8, 15]
  - [15, 16, 15, 16]
feature_mapping:
  observation.state:
    - observation.states.joint.position
    - observation.states.effector.position
  action:
    - actions.joint.position
    - actions.effector.position
image_mapping:
  observation.images.head: observation.images.image0
  observation.images.hand_left: observation.images.image1
  observation.images.hand_right: observation.images.image2
description: "A2D dual-arm 7-DOF robot (AgiBotWorld)"