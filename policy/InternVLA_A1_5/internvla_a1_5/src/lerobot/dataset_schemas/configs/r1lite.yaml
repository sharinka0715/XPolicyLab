# R1Lite dual-arm robot
robot_type: r1lite
action_mask_spec: [6, 6, -1, -1]
# Reorder action dimensions with flexible src->dst mapping
# Format: [src_start, src_end, dst_start, dst_end]
# Original: left_arm(6) + right_arm(6) + left_gripper(1) + right_gripper(1) = 14 dims
# Reordered: left_arm(6) + left_gripper(1) + right_arm(6) + right_gripper(1) = 14 dims
action_reorder:
  - [0, 6, 0, 6]      # left_arm: src[0:6] -> dst[0:6]
  - [12, 13, 7, 8]    # left_gripper: src[12:13] -> dst[6:7]
  - [6, 12, 8, 14]    # right_arm: src[6:12] -> dst[7:13]
  - [13, 14, 15, 16]  # right_gripper: src[13:14] -> dst[13:14]
state_reorder:
  - [0, 6, 0, 6]
  - [12, 13, 7, 8]
  - [6, 12, 8, 14]
  - [13, 14, 15, 16]
feature_mapping:
  observation.state:
    - observation.state.left_arm
    - observation.state.right_arm
    - observation.state.left_gripper
    - observation.state.right_gripper
  action:
    - action.left_arm
    - action.right_arm
    - action.left_gripper
    - action.right_gripper
image_mapping:
  observation.images.head_rgb: observation.images.image0
  observation.images.left_wrist_rgb: observation.images.image1
  observation.images.right_wrist_rgb: observation.images.image2
description: "R1Lite dual-arm robot"