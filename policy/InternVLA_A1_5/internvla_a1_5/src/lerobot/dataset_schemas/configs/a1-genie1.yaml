# Genie-1 dual-arm 7-DOF robot (A1 old format)
robot_type: genie1
action_mask_spec: [14, -2]
# Reorder action dimensions with flexible src->dst mapping
# Format: [src_start, src_end, dst_start, dst_end]
# Original: left_joint(7) + right_joint(7) + left_gripper(1) + right_gripper(1) = 16 dims
# Reordered: left_joint(7) + left_gripper(1) + right_joint(7) + right_gripper(1) = 16 dims
action_reorder:
  - [0, 7, 0, 7]      # left_joint: src[0:7] -> dst[0:7]
  - [14, 15, 7, 8]    # left_gripper: src[14:15] -> dst[7:8]
  - [7, 14, 8, 15]    # right_joint: src[7:14] -> dst[8:15]
  - [15, 16, 15, 16]  # right_gripper: src[15:16] -> dst[15:16]
state_reorder:
  - [0, 7, 0, 7]
  - [14, 15, 7, 8]
  - [7, 14, 8, 15]
  - [15, 16, 15, 16]
feature_mapping:
  observation.state:
    - states.left_joint.position
    - states.right_joint.position
    - states.left_gripper.position
    - states.right_gripper.position
  action:
    - actions.left_joint.position
    - actions.right_joint.position
    - actions.left_gripper.position
    - actions.right_gripper.position
image_mapping:
  images.rgb.head: observation.images.image0
  images.rgb.hand_left: observation.images.image1
  images.rgb.hand_right: observation.images.image2
description: "Genie-1 dual-arm 7-DOF robot (A1 old format)"