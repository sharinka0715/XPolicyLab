# Piper RobotWin robot
robot_type: piper_robotwin
action_mask_spec: [6, -1, 6, -1]
# Reorder action dimensions with flexible src->dst mapping
# Format: [src_start, src_end, dst_start, dst_end]
# Creates zero tensor of target size, copies src slices to dst positions
# Original: left_joint(6) + left_gripper(1) + right_joint(6) + right_gripper(1) = 14 dims
# Reordered: left_joint(6) + gap(1) + left_gripper(1) + right_joint(6) + gap(2) + right_gripper(1) = 16 dims
# Result: indices 6, 14, 15 are zeros
action_reorder:
  - [0, 6, 0, 6]      # left_joint: src[0:6] -> dst[0:6]
  - [6, 7, 7, 8]      # left_gripper: src[6:7] -> dst[7:8] (gap at index 6)
  - [7, 13, 8, 14]    # right_joint: src[7:13] -> dst[8:14]
  - [13, 14, 15, 16]  # right_gripper: src[13:14] -> dst[15:16] (gap at indices 14,15)
state_reorder:
  - [0, 6, 0, 6]
  - [6, 7, 7, 8]
  - [7, 13, 8, 14]
  - [13, 14, 15, 16]
feature_mapping:
  observation.state:
    - observation.state
  action:
    - action
image_mapping:
  observation.images.cam_high: observation.images.image0
  observation.images.cam_left_wrist: observation.images.image1
  observation.images.cam_right_wrist: observation.images.image2
description: "Piper RobotWin robot"