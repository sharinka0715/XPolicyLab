# Ebench ARX Lift-2 dual-arm robot (A1 new format)
robot_type: "lift2"
action_mask_spec: [12, 3, -4]
# Reorder action dimensions with flexible src->dst mapping
# Format: [src_start, src_end, dst_start, dst_end]
# Creates zero tensor of target size, copies src slices to dst positions
# Original: left_joint(6) + left_gripper(1) + right_joint(6) + right_gripper(1) = 14 dims
# Reordered: left_joint(6) + gap(1) + left_gripper(1) + right_joint(6) + gap(2) + right_gripper(1) = 16 dims
# Result: indices 6, 14, 15 are zeros
action_reorder:
  - [0, 6, 0, 6] 
  - [15, 17, 6, 8]    
  - [6, 12, 8, 14]   
  - [17, 19, 14, 16]  
  - [12, 15, 16, 19]  # base: src[12:15] -> dst[16:19] 
state_reorder:
  - [0, 6, 0, 6]
  - [15, 17, 6, 8]
  - [6, 12, 8, 14]
  - [17, 19, 14, 16]
  - [12, 15, 16, 19]
feature_mapping:
  observation.state:
    - state.joints
    - state.base
    - state.gripper
  action:
    - action.joints
    - action.base
    - action.gripper
image_mapping:
  video.overlook_camera_view: observation.images.image0
  video.left_camera_view: observation.images.image1
  video.right_camera_view: observation.images.image2
description: "Ebench lift2 robot"