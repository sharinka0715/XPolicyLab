# Basic experiment configuration
policy_name: InternVLA_A1_5
protocol: ws
host: localhost
bench_name: null
task_name: null
env_cfg: null
env_cfg_type: null
seed: null
eval_batch: true

checkpoint_num: 60000
# Set this to an exported checkpoint directory or a Hugging Face model repo id.
# setup_eval_policy_server.sh also accepts the INTERNVLA_CKPT_PATH override.
ckpt_path: null
result_dir: "./results/InternVLA-A1.5-20/"
obs_transform_pipeline: null

# Model / action configuration
action_type: joint
stats_key: unified_robot
resize_size: 224
infer_horizon: 20
action_horizon_size: 50
action_mode: delta
device: cuda
dtype: float32

# A1.5-specific configuration
inference_backend: standard
tokenize_state: true
max_state_dim: 32
max_action_dim: 32

port: 6000

# Disable websocket keepalive for local/same-node evaluation. Isaac startup can
# block the synchronous client long enough for keepalive pings to time out.
ws_ping_interval_s: null
ws_ping_timeout_s: null
