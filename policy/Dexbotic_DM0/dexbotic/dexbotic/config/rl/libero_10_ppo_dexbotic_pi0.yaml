defaults:
  - env/libero_10@env.train
  - env/libero_10@env.eval
  - model/dexbotic_pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null

cluster:
  num_nodes: 1                  # Single-node default; scale up via Hydra CLI override
  component_placement:
    actor,env,rollout: all      # Co-locate actor/env/rollout on every GPU (simplest layout)

runner:
  task_type: embodied
  logger:
    log_path: "../results"                         # Root for checkpoints / videos / tensorboard
    project_name: rlinf
    experiment_name: "libero_10_ppo_dexbotic_pi0"  # Sub-folder used for this run
    logger_backends: ["tensorboard"]

  max_epochs: 1000              # Upper bound on epochs (rollout + update cycles)
  max_steps: 30                 # Hard cap on global steps; trainer saves on last step

  only_eval: False              # Set True to skip training and run evaluation only
  eval_policy_path: null        # When only_eval=True, path to policy checkpoint to evaluate
  val_check_interval: -1        # Steps between eval passes; -1 disables periodic eval
  save_interval: 50             # Save checkpoint every N global steps (must be >0)

  resume_dir: null              # Optional: resume from a saved step dir (e.g. checkpoints/global_step_10)
  ckpt_path: null               # Optional: .pt to load after model init (typically for eval)

algorithm:
  normalize_advantages: True    # Standard PPO advantage normalization per batch
  kl_penalty: kl                # KL penalty type ("kl" | "k1" | "k2" | ...)
  group_size: 1                 # GRPO-style grouping; 1 == PPO single-sample
  reward_coef: 1.0

  rollout_epoch: 1              # Rollout collection passes per training epoch
  eval_rollout_epoch: 1

  reward_type: chunk_level      # Reward granularity: per action chunk
  logprob_type: chunk_level     # Aggregate log-prob at the action-chunk level
  entropy_type: token_level     # Entropy accumulated per token

  update_epoch: 4               # PPO inner update passes per rollout
  adv_type: gae                 # Advantage estimator ("gae" | "reinforce" | ...)
  loss_type: actor_critic       # "actor_critic" = PPO with value head
  loss_agg_func: "token-mean"   # How to aggregate loss across tokens
  kl_beta: 0.05                 # KL regularization weight vs. reference policy
  entropy_bonus: 0.01           # Bonus on entropy to prevent premature determinism
  clip_ratio_high: 0.3
  clip_ratio_low: 0.3
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: False         # If True, drop rollouts outside [lower_bound, upper_bound]
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9

  sampling_params:              # Trajectory sampling controls
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:                # Token length bounds for sampling
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False         # Offload env workers to CPU when idle

  train:
    total_num_envs: 16          # Parallel training envs; tune with GPU count
    max_episode_steps: 480
    max_steps_per_rollout_epoch: 480
    video_cfg:
      save_video: True
  eval:
    total_num_envs: 1           # Serial eval (1 env); raise for faster eval
    auto_reset: True            # Eval expects auto-reset on episode end
    ignore_terminations: True   # Eval ignores terminations (runs full horizon)
    max_episode_steps: 480
    max_steps_per_rollout_epoch: 480
    group_size: 1
    is_eval: True
    video_cfg:
      save_video: False
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"   # HF inference backend (alternatives: sglang / vllm)
  recompute_logprobs: False           # Re-run forward to obtain log-probs (slower, more accurate)
  enable_offload: True                # Offload rollout model to CPU between epochs
  pipeline_stage_num: 1               # Pipeline parallel stages for rollout (1 == disabled)

  model:
    model_path: ${actor.model.model_path}
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"            # See ``training_backend/*`` for backend-specific knobs
  micro_batch_size: 2                 # Per-step batch for FSDP forward/backward
  global_batch_size: 128              # Total batch aggregated across all workers
  seed: 42
  enable_offload: True                # Offload actor state when not training

  model:
    # Override on CLI with ``actor.model.model_path=/path/to/ckpt`` per run.
    model_path: "path/to/model/libero_pi0"
    precision: "bf16"
    num_action_chunks: 5              # Action-chunk length used at rollout time
    num_steps: 4                      # Denoising steps during policy forward
    action_dim: 7                     # Libero end-effector action dim
    add_value_head: True
    dexbotic:
      num_images_in_input: 2
      noise_level: 0.5
      action_chunk: ${actor.model.num_action_chunks}
      num_steps: ${actor.model.num_steps}
      train_expert_only: True
      action_env_dim: ${actor.model.action_dim}
      noise_method: "flow_sde"
      add_value_head: ${actor.model.add_value_head}
      detach_critic_input: True

  optim:
    lr: 1.0e-6                        # Actor (policy) learning rate
    value_lr: 1.0e-4                  # Value-head learning rate
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 5                      # Gradient-norm clip
    critic_warmup_steps: 0            # Value-only warmup steps before joint training

  fsdp_config:                        # Overrides on top of training_backend/fsdp defaults
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False             # Use env reward directly (no learned reward model)

critic:
  use_critic_model: False             # Value head lives inside actor model; no separate critic
