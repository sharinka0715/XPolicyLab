defaults:
  - env/libero_spatial@env.train
  - env/libero_spatial@env.eval
  - model/dexbotic_dm0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null

cluster:
  num_nodes: 1                  # Single-node default; scale up via Hydra CLI override
  component_placement:
    actor,env,rollout: all      # Co-locate actor/env/rollout on every GPU

runner:
  task_type: embodied
  logger:
    log_path: "../results"                                  # Root for checkpoints / videos / tensorboard
    project_name: rlinf
    experiment_name: "libero_spatial_ppo_dexbotic_dm0"
    logger_backends: ["tensorboard"]

  max_epochs: 1000              # Upper bound on rollout+update epochs
  max_steps: -1                 # -1 = no cap; rely on max_epochs/save_interval

  only_eval: False              # True to skip training and run evaluation only
  eval_policy_path: null        # When only_eval=True, path to policy checkpoint to evaluate
  val_check_interval: -1        # Steps between eval passes; -1 disables periodic eval
  save_interval: 50             # Save checkpoint every N global steps
  resume_dir: null              # Optional: resume from a saved step dir
  per_worker_log: False         # Per-worker log files (one per Ray worker)
  per_worker_log_path: null
  weight_sync_interval: 1       # Actor→Rollout weight sync frequency (in epochs)

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1                 # GRPO-style grouping; 1 == PPO single-sample
  reward_coef: 1.0
  rollout_epoch: 2              # DM0 default: collect 2 rollout epochs per train epoch
  eval_rollout_epoch: 1

  reward_type: chunk_level      # Reward granularity: per action chunk
  logprob_type: chunk_level     # Aggregate log-prob at the action-chunk level
  entropy_type: token_level     # Entropy accumulated per token

  update_epoch: 4               # PPO inner update passes per rollout
  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: token-mean
  kl_beta: 0.0                  # KL penalty disabled for DM0 by default
  entropy_bonus: 0              # Entropy bonus disabled for DM0 by default
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0
  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: False         # If True, drop rollouts outside [lower, upper]
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9

  sampling_params:              # Trajectory sampling controls
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False
  train:
    total_num_envs: 64          # DM0 uses 64 parallel train envs
    # Uses libero_spatial defaults: max_episode_steps=240, horizon=240
  eval:
    total_num_envs: 500         # Large-scale eval rollout
    auto_reset: True
    ignore_terminations: True
    is_eval: True
    video_cfg:
      save_video: False
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"   # HF inference backend (alternatives: sglang / vllm)
  recompute_logprobs: False           # Re-run forward to obtain log-probs (slower, more accurate)
  unnorm_key: libero_spatial          # Dataset key used for action unnormalization
  enable_offload: False
  pipeline_stage_num: 1
  model:
    model_path: ${actor.model.model_path}
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32                # DM0 uses larger batch than Pi0
  global_batch_size: 1024
  seed: 42
  enable_offload: False

  model:
    # Override on CLI with ``actor.model.model_path=/path/to/ckpt`` per run.
    model_path: "path/to/model/dm0-libero"
    precision: bf16
    num_action_chunks: 10             # Action-chunk length used at rollout time
    action_dim: 7                     # Libero end-effector action dim
    is_lora: False
    lora_rank: 32
    use_proprio: True                 # Feed proprioceptive state to the model
    num_steps: 4                      # Denoising steps during policy forward
    add_value_head: True
    safe_get_logprob: False
    chunk_critic_input: True
    noise_anneal: False
    joint_logprob: False
    value_after_vlm: False
    dexbotic:
      num_images_in_input: 2
      noise_level: 0.5
      action_chunk: ${actor.model.num_action_chunks}
      num_steps: ${actor.model.num_steps}
      train_expert_only: True
      action_env_dim: ${actor.model.action_dim}
      noise_method: "flow_sde"
      add_value_head: ${actor.model.add_value_head}
      detach_critic_input: True

  optim:
    lr: 1.0e-06                       # Actor (policy) learning rate
    value_lr: 0.0001                  # Value-head learning rate
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0                    # Gradient-norm clip (tighter than Pi0)
    critic_warmup_steps: 0

  fsdp_config:                        # Overrides on top of training_backend/fsdp defaults
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}
    amp_autocast:
      enabled: False
      precision: ${actor.model.precision}
    grad_scaler:
      enabled: False
      init_scale: null
      growth_interval: null

reward:
  use_reward_model: False

critic:
  use_critic_model: False
