common:
  action_dim: 14
  state_dim: 14
  num_video_frames: 8
  video_height: 384
  video_width: 320
  global_downsample_rate: 3
  video_action_freq_ratio: 2

dataset:
  type: "robotwin"
  dataset_dir: "/vepfs-cnbje63de6fae220/xspark_shared/robotwin_data/motus_processed"
  data_mode: "clean"
  task_mode: "multi"
  task_name: null
  max_episodes: null
  image_aug: false

model:
  wan:
    config_path: "/vepfs-cnbje63de6fae220/xspark_shared/model_weights/Wan2.2-TI2V-5B"
    checkpoint_path: "/vepfs-cnbje63de6fae220/xspark_shared/model_weights/Wan2.2-TI2V-5B"
    vae_path: "/vepfs-cnbje63de6fae220/xspark_shared/model_weights/Wan2.2-TI2V-5B/Wan2.2_VAE.pth"
    precision: "bfloat16"

  vlm:
    checkpoint_path: "/vepfs-cnbje63de6fae220/xspark_shared/model_weights/Qwen3-VL-2B-Instruct"
    precision: "bfloat16"
    frozen: true

  action_expert:
    hidden_size: 1024
    ffn_dim_multiplier: 4
    norm_eps: 1e-5

  und_expert:
    hidden_size: 512
    ffn_dim_multiplier: 4
    norm_eps: 1e-5

    vlm:
      input_dim: 2048
      projector_type: "mlp3x_silu"

  time_distribution:
    timestep_sample_method: "logit_normal"
    sigmoid_scale: 1.0
    min_t: 0.0
    max_t: 1.0

  inference:
    num_inference_timesteps: 10

  loss_weights:
    video_loss_weight: 1.0
    action_loss_weight: 1.0

  ema:
    enabled: false
    update_after_step: 0
    inv_gamma: 1.0
    power: 0.75
    min_value: 0.0
    max_value: 0.9999

training:
  batch_size: 4
  gradient_accumulation_steps: 2
  max_steps: 1000000
  learning_rate: 5.0e-5
  weight_decay: 0.01
  scheduler_type: "linear"
  warmup_steps: 200
  cycle_length: 5000000
  f_max: 0.99
  f_min: 0.4
  grad_clip_norm: 0.5
  use_amp: true
  find_unused_parameters: false

system:
  checkpoint_dir: "./checkpoints"
  log_level: "INFO"
  log_interval: 1
  save_interval: 5000
  val_interval: 5000
  num_workers: 16
  pin_memory: true

logging:
  report_to: "tensorboard"
  wandb_project: "motus"
  tensorboard_log_dir: "tensorboard_logs"
  run_name: "robotwin_xspark"

resume:
  checkpoint_path: null

finetune:
  checkpoint_path: "/vepfs-cnbje63de6fae220/xspark_shared/model_weights/Motus"