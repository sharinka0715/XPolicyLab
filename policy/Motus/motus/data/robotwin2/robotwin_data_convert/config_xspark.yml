# RobotWin -> Motus conversion config for xspark_shared data layout

source_root: "/path/to/robotwin_data/raw"
target_root: "/path/to/robotwin_data/motus_processed"

fps: 30
target_width: 320
target_height: 360

max_workers: 16
skip_existing: true

demo_type_mapping:
  aloha-agilex_clean_50: "clean"
  aloha-agilex_randomized_500: "randomized"

enable_t5_embeddings: true
wan_repo_path: "/path/to/model_weights/Wan2.2-TI2V-5B"
t5_max_length: 512

cuda_devices: ["0", "1", "2", "3", "4", "5", "6", "7"]

log_level: "INFO"
save_debug_frames: false
debug_output_dir: "/tmp/robotwin_debug"