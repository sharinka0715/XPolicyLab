# RoboDojo sim joint training (arx_x5, 14-dim qpos)
# LeRobot v2.1: <lerobot_root>/RoboDojo_sim_arx-x5_v21
# data_config: robodojo_qpos (cam_high / cam_left_wrist / cam_right_wrist)

robodojo_posttrain:
  dataset_names:
  - RoboDojo_sim_arx-x5_v21

  data_config_names:
  - "robodojo_qpos"

  embodiment_tags:
  - "new_embodiment"

  sampling_strategy: "step"
  video_backend: "torchvision_av"

  vit_transform_args:
    type: "beingh"
    normalize_type: "imagenet"
    use_color_jitter: true

  frame_step_size:
  - 1

  num_used_episodes_per_task:
  - -1

  num_used_episodes_per_dataset:
  - -1

  num_used_frames_per_dataset:
  - -1

  weight: 1
