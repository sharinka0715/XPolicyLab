# @package _global_
# G0Plus_3B joint fine-tune on XPolicyLab / RoboDojo LeRobot v3.0 datasets
# (flat 14-dim state/action, cam_high / cam_left_wrist / cam_right_wrist).
# Override pretrained_ckpt / dataset_dirs via train.sh or hydra CLI.

defaults:
  - override /data: xpolicylab/dual_arm_joint_robodojo
  - override /model: vla/g0plus

model:
  pretrained_ckpt: checkpoints/G0Plus_3B_base/checkpoints
  use_pretrained_norm_stats: False

data:
  dataset:
    lerobot_ds_version: "3.0"
    dataset_dirs: null
