model:
  model_path: /path/to/model_weights/lingbot-vla-4b
  tokenizer_path: /path/to/model_weights/Qwen2.5-VL-3B-Instruct/
  post_training: true
  adanorm_time: true
  old_adanorm: true

data:
  datasets_type: vla
  data_name: robotwin_fold_clothes_0
  train_path: /path/to/lerobot/fold_clothes
  num_workers: 8
  norm_type: bounds_99_woclip
  norm_stats_file: assets/norm_stats/fold_clothes_0.json

train:
  output_dir: output/fold_clothes_01
  loss_type: L1_fm
  data_parallel_mode: fsdp2
  enable_full_shard: false
  module_fsdp_enable: true
  use_compile: true
  use_wandb: true
  rmpad: false
  rmpad_with_pos_ids: false
  ulysses_parallel_size: 1
  freeze_vision_encoder: false
  tokenizer_max_length: 24
  action_dim: 14
  max_action_dim: 75
  max_state_dim: 75
  lr: 1.0e-4
  lr_decay_style: constant
  num_train_epochs: 69
  micro_batch_size: 8
  global_batch_size: 32
  max_steps: 220000
  ckpt_manager: dcp
  save_steps: 220000
  save_epochs: 1
  enable_fp32: true
  enable_resume: true