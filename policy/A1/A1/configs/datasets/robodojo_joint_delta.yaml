# RoboTwin 3.0 / RoboDojo dataset config (ARX5 dual-arm, joint-space delta)
# 14-D action: [left arm 6 | left gripper 1 | right arm 6 | right gripper 1]
# delta_mask=[6,-1,6,-1]: use delta for both arm joints and absolute values for grippers

image_augmentation:
  enable: false
  enable_random_erasing: false
  enable_sharpening: true
  augmentation_prob: 0.5

robodojo:
  - path: data/robotwin3/RoboDojo/arrange_largest_number
    weight: 1.0
    normalization_type: bounds_q99
    norm_stats_path: assets/robodojo_joint_delta.json
    delta: true
    delta_mask: [6, -1, 6, -1]
    action_type: joint
    camera_keys: [cam_head, cam_left_wrist, cam_right_wrist]
  - path: data/robotwin3/RoboDojo/build_tower
    weight: 1.0
    normalization_type: bounds_q99
