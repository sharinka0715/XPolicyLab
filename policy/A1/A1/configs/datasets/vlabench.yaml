# Dataset configuration for VLAbench

# Image augmentation configuration (optional, defaults will be used if not configured)
image_augmentation:
  enable: true              # Whether to enable image augmentation
  enable_random_erasing: true   # Whether to enable random erasing
  enable_sharpening: true       # Whether to enable sharpening
  augmentation_prob: 0.5        # Probability of applying augmentation

lerobot:
  - path: data/vlabench
    weight: 1.0
